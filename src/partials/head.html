<!DOCTYPE html>
<html lang="@@htmlLang">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary SEO -->
  <title>@@title</title>
  <meta name="description" content="@@description">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Sirio Agency">
  <link rel="canonical" href="@@canonical">
  <link rel="alternate" hreflang="x-default" href="https://sirio.agency/">
  <link rel="alternate" hreflang="en" href="https://sirio.agency/">
  <link rel="alternate" hreflang="uk" href="https://sirio.agency/ua/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Sirio Agency">
  <meta property="og:title" content="@@ogTitle">
  <meta property="og:description" content="@@ogDescription">
  <meta property="og:url" content="@@ogUrl">
  <meta property="og:image" content="https://sirio.agency/images/og-image-1200x630.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="2400">
  <meta property="og:image:height" content="1260">
  <meta property="og:image:alt" content="@@ogImageAlt">
  <meta property="og:locale" content="@@ogLocale">
  <meta property="og:locale:alternate" content="@@ogLocaleAlternate">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="@@twitterTitle">
  <meta name="twitter:description" content="@@twitterDescription">
  <meta name="twitter:image" content="https://sirio.agency/images/og-image-1200x630.png">
  <meta name="twitter:image:alt" content="@@twitterImageAlt">

  <!-- Geo -->
  <meta name="geo.region" content="NL">
  <meta name="geo.placename" content="Eindhoven">

  <!-- Theme -->
  <meta name="theme-color" content="#0B1410">

  <!-- Favicons & App Icons -->
  <link rel="icon" type="image/svg+xml" href="/images/sirio-favicon.svg">
  <link rel="icon" type="image/png" sizes="64x64" href="/images/sirio-favicon.png">
  <link rel="mask-icon" href="/images/sirio-logo-mono-black.svg" color="#1D9E75">
  <link rel="apple-touch-icon" href="/images/sirio-icon-512.png">
  <meta name="apple-mobile-web-app-title" content="Sirio">
  <meta name="application-name" content="Sirio">
  <meta name="msapplication-TileColor" content="#1D9E75">
  <meta name="msapplication-TileImage" content="/images/sirio-icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.min.css">

  <!-- Structured Data -->
@@include('partials/schema-organization.html')
@@include('partials/schema-website.html')
</head>
